<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TurnoListo | Abriendo pedido</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./turnolisto-brand.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TurnoListo" />
    <meta name="theme-color" content="#1f7a63" />
    <link rel="stylesheet" href="./styles.css?v=20260415g" />
  </head>
  <body class="client-view">
    <div class="app-shell">
      <main class="grid grid--single">
        <section class="panel panel--client glass-card">
          <article class="ticket ticket--client">
            <div class="ticket__top">
              <div>
                <h3>Abriendo tu pedido</h3>
                <p class="ticket__label">Estamos preparando el seguimiento.</p>
              </div>
              <span class="status-pill" style="background: rgba(31, 122, 99, 0.12); color: #1f7a63">TurnoListo</span>
            </div>
            <div class="callout">
              <strong>Un momento...</strong>
              <span>Te llevamos al estado actual de tu pedido.</span>
            </div>
          </article>
        </section>
      </main>
    </div>
    <script>
      (function () {
        const LAST_CLIENT_ORDER_STORAGE_KEY = "turnolisto-client-last-order";
        const params = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(String(window.location.hash || "").replace(/^#/, ""));
        const normalizeOrderId = (value) => String(value || "").trim().toUpperCase();
        const orderFromUrl = normalizeOrderId(hashParams.get("order") || params.get("order") || "");
        const storedOrder = normalizeOrderId(window.localStorage.getItem(LAST_CLIENT_ORDER_STORAGE_KEY) || "");
        const orderId = orderFromUrl || storedOrder || "TL-ANA2048Q2Z9";

        if (orderId) {
          window.localStorage.setItem(LAST_CLIENT_ORDER_STORAGE_KEY, orderId);
        }

        const targetUrl = new URL("./client.html", window.location.href);
        targetUrl.searchParams.set("order", orderId);
        window.location.replace(targetUrl.toString());
      })();
    </script>
    <script src="./i18n.js?v=20260415b"></script>
  </body>
</html>
